# Question bank for the interview Session (issues 0005 / 0013).
#
# Top-level mapping: canonical Skill -> ordered list of questions. The Supervisor rotates through a
# Skill's questions when it probes the same Skill again, so each Skill needs >= 2 distinct questions
# for an `extra_question` to land on a *different* prompt. The loader enforces >= 1 per Skill.
#
# Each question carries:
#   question:          the prompt put to the Candidate
#   difficulty:        1–5 target level; the Topic Plan's target_difficulty picks the closest match
#                      (optional, defaults to 3). Each Skill spreads its questions across levels so
#                      an easy vs hard target lands on different prompts (issue 0025).
#   rubric.weights:    per-dimension weights over the fixed 5 dimensions
#                      (correctness, depth, communication, system_thinking, mlops_awareness).
#                      Weight 0 disables a dimension so the Evaluator does not score it — e.g. a pure
#                      concept question is not scored on mlops_awareness.
#   answers:           scripted fixture replies; answers[0] answers the question, answers[1:] answer
#                      successive Follow-ups (a weak opener that improves so the micro-loop converges).
#   expected_concepts: concept-note ids (data/concepts.yaml) this question is expected to surface.
#   follow_up_seeds:   hand-written probe starters the Interviewer can lean on.
#
# HITL: questions and rubric weights need human domain review for accuracy and difficulty calibration.

ml_fundamentals:
  - question: >-
      Explain the bias–variance tradeoff and how it guides model selection and regularization. What do
      you watch on the learning curves?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        Bias is error from overly simple assumptions; variance is sensitivity to the particular
        training sample. Expected error decomposes into bias squared, variance, and irreducible noise,
        so lowering one often raises the other. A high-bias model underfits — train and validation
        error are both high and close; a high-variance model overfits — low train error but a wide gap
        to validation. I read learning curves to tell them apart: curves that converge at a high error
        mean I should add capacity or features; a persistent gap means I should regularize. L2 shrinks
        weights to cut variance, L1 also does feature selection, and I tune the strength with
        cross-validation, picking where validation error bottoms out before it climbs again.
      - >-
        Concretely: if I see train MSE 0.1 and validation MSE 0.9, that wide gap is high variance, so I
        add L2, gather more data, or reduce model capacity, and I confirm the gap narrows.
    difficulty: 3
    expected_concepts: [ml_fundamentals_bias_variance, ml_fundamentals_l2_regularization]
    follow_up_seeds:
      - Push for a concrete numeric diagnosis from a train/validation error pair.
      - Ask which fix they would try first and why, given a wide generalization gap.

  - question: >-
      Why does L2 regularization reduce overfitting, and how would you choose its strength?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        L2 regularization stops overfitting by making the model simpler. You add it to the loss and it
        makes the weights smaller, which is better. You pick the strength by trying a few values and
        seeing what works.
      - >-
        It adds a penalty proportional to the sum of squared weights, so the optimizer trades a little
        training fit for smaller weights. Smaller weights mean a smoother function that is less
        sensitive to individual training points, which is what lowers variance.
      - >-
        I choose lambda with k-fold cross-validation over a log-spaced grid, picking the value where
        mean validation error is lowest; too large under-fits (bias rises), too small lets variance
        back in, so I look for the bottom of that validation curve.
    difficulty: 2
    expected_concepts: [ml_fundamentals_l2_regularization]
    follow_up_seeds:
      - Probe the penalty-to-variance mechanism, not just "smaller weights".
      - Ask how they would search the regularization strength concretely.

  - question: >-
      Explain how k-fold cross-validation works and when it can still mislead you.
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        You split the data into k folds, train on k-1 and validate on the held-out fold, rotate through
        all k, and average the scores. It gives a more stable estimate than a single split.
      - >-
        It misleads when the folds break an assumption: with time series, random folds leak the future
        into training, so I use forward-chaining splits; with grouped or imbalanced data I use grouped
        or stratified folds; and any preprocessing fit on the whole set before splitting leaks
        information and inflates the score.
    difficulty: 4
    expected_concepts: [ml_fundamentals_cv_leakage]
    follow_up_seeds:
      - Ask for a concrete leakage trap and the fold scheme that avoids it.

  - question: >-
      Your fraud model reports 99% accuracy, but the business says it misses most fraud. Which
      metrics do you look at instead, and why?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        With ~1% fraud, predicting everything as legitimate already scores 99% accuracy, so accuracy
        says nothing. I look at recall — what fraction of actual fraud we catch — and precision —
        what fraction of our alerts are real — plus F1 or PR-AUC to summarize the tradeoff, and I
        choose the alert threshold from the cost of a missed fraud versus a false alarm.
      - >-
        I prefer PR-AUC over ROC-AUC here: the false-positive rate divides by the huge negative
        class, so ROC-AUC can look excellent while precision is terrible. The precision-recall curve
        shows what the review team actually experiences, and I pick the operating point that fills
        their queue with the highest-recall mix they can handle.
    difficulty: 2
    expected_concepts: [ml_fundamentals_classification_metrics]
    follow_up_seeds:
      - Ask why ROC-AUC can look optimistic under heavy imbalance while PR-AUC does not.
      - Push for how they would set the alert threshold given a fixed review-queue capacity.

  - question: >-
      You have a 1-to-100 imbalanced dataset. Walk me through training and evaluating a classifier on
      it without fooling yourself.
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        I use stratified splits so every fold sees the minority class, then either class weights in
        the loss or resampling to balance training, and I evaluate with precision/recall and PR-AUC
        rather than accuracy, tuning the decision threshold on validation.
      - >-
        The trap is where resampling happens: oversampling before the split leaks near-copies of
        minority samples into validation and inflates the score. I resample inside the training folds
        only, and I report final metrics on an untouched test set at the natural class distribution,
        because that is the distribution production will see.
    difficulty: 3
    expected_concepts: [ml_fundamentals_class_imbalance, ml_fundamentals_classification_metrics]
    follow_up_seeds:
      - Probe where resampling belongs relative to the train/validation split, and why.

  - question: >-
      Which models need feature scaling and which do not? Give me the reasoning, not just the list.
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        Models driven by distances or by gradient steps with one shared learning rate need scaling:
        kNN, SVM, k-means, PCA, regularized linear models, neural nets — an unscaled feature
        dominates the distance or gets penalized unfairly by L1/L2. Tree models split on thresholds,
        which are invariant to monotone transforms, so forests and boosting do not care.
      - >-
        And the scaler is fit on the training split only, then applied to validation and test —
        fitting it on the full dataset leaks test-set statistics into training, which is the same
        leakage mistake as preprocessing before a cross-validation split.
    difficulty: 1
    expected_concepts: [ml_fundamentals_feature_scaling]
    follow_up_seeds:
      - Ask why tree ensembles are insensitive to monotone feature transforms.
      - Probe where the scaler must be fit to avoid leakage.

  - question: >-
      Compare random forests and gradient boosting: how does each reduce error, and when would you
      pick one over the other?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        A random forest bags: it trains trees independently on bootstrap samples and averages, which
        cuts variance — robust, parallel, and more trees rarely overfit. Gradient boosting fits trees
        sequentially to the current ensemble's residuals, which cuts bias and usually wins on tabular
        data, but it is touchier to tune.
      - >-
        I reach for the forest when labels are noisy or I want a strong baseline with little tuning;
        boosting when I need the extra accuracy and can pay for it — lower learning rate with more
        trees, early stopping on validation, and care with noise, because sequential residual fitting
        chases mislabeled points that bagging would average away.
    difficulty: 3
    expected_concepts: [ml_fundamentals_ensembles]
    follow_up_seeds:
      - Ask what boosting's sequential residual fitting means for label noise.

  - question: >-
      Why is cross-entropy preferred over squared error for training classifiers?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        Because it works better for classification. MSE is the loss for regression and cross-entropy
        is the loss for classification — that is the standard pairing, and cross-entropy trains
        faster in practice.
      - >-
        The mechanism: cross-entropy is the negative log-likelihood of the label under the model, and
        with a sigmoid or softmax output its gradient with respect to the logits is just prediction
        minus target — large exactly when the model is confidently wrong. Squared error's gradient
        carries an extra sigmoid-derivative factor that vanishes in that same regime, so the network
        stalls on its worst mistakes.
      - >-
        There is also an optimization-shape argument: for a linear model, cross-entropy in the logits
        is convex, while squared error through a sigmoid is not, so gradient descent is much better
        behaved on the cross-entropy surface.
    difficulty: 4
    expected_concepts: [ml_fundamentals_cross_entropy]
    follow_up_seeds:
      - Push past "it's the standard pairing" to the gradient behavior when the model is confidently wrong.

  - question: >-
      Your kNN classifier works well on 10 features but collapses on 1,000. What is happening
      geometrically, and what do you do about it?
    rubric:
      weights: {correctness: 0.35, depth: 0.3, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.0}
    answers:
      - >-
        That is the curse of dimensionality: in high dimensions the data is exponentially sparse and
        pairwise distances concentrate — the nearest and farthest neighbors become nearly
        equidistant — so the neighborhood that kNN votes over stops carrying signal.
      - >-
        Concretely, the ratio of nearest to farthest distance tends toward one as dimensions grow. I
        would reduce to a space where distance means something: feature selection, PCA or a learned
        embedding, or metric learning — or switch to a model whose structural assumptions supply the
        signal instead of raw geometry.
    difficulty: 5
    expected_concepts: [ml_fundamentals_curse_dimensionality]
    follow_up_seeds:
      - Ask what happens to the ratio of nearest to farthest distances as dimensionality grows.

deep_learning:
  - question: >-
      Explain why residual connections help train deep neural networks, and name one failure mode they
      do not automatically solve.
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Residual connections let layers learn a delta around an identity path, which improves gradient
        flow and makes very deep networks easier to optimize. They do not by themselves fix data
        leakage, label noise, or poor objective design.
      - >-
        Concretely the skip path keeps the Jacobian close to identity, so gradients reach early layers
        without vanishing; but a wrong loss or leaked features still train a confidently wrong model —
        depth is no longer the bottleneck, the objective is.
    difficulty: 3
    expected_concepts: [deep_learning_residual_connections]
    follow_up_seeds:
      - Ask for the gradient-flow mechanism in terms of the Jacobian.

  - question: >-
      Why does batch normalization speed up training, and when can it behave surprisingly or hurt?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        It normalizes layer inputs per mini-batch, which smooths the loss landscape and lets you use
        higher learning rates. It can misbehave with very small batches and at inference, where it
        switches to running statistics.
      - >-
        With tiny or non-i.i.d. batches the batch statistics are noisy and train/inference skew
        appears, so I switch to group or layer norm; in RNNs and some fine-tuning regimes I freeze the
        running stats to stop them drifting away from the deployment distribution.
    difficulty: 4
    expected_concepts: [deep_learning_batch_normalization]
    follow_up_seeds:
      - Probe the train/inference statistics mismatch and when it bites.

  - question: >-
      What causes vanishing or exploding gradients in deep networks, and what concrete techniques keep
      training stable?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        When you stack many layers, repeated multiplication of Jacobians shrinks gradients toward zero
        or blows them up, so early layers stop learning or training diverges. Skip connections, careful
        initialization, normalization, and gradient clipping all help.
      - >-
        More concretely: residual paths keep the Jacobian near identity so signal reaches early layers;
        He/Xavier initialization keeps activation variance roughly constant across depth; normalization
        rescales activations; and clipping bounds the update norm so a rare huge gradient does not
        destabilize the run.
    difficulty: 2
    expected_concepts: [deep_learning_residual_connections]
    follow_up_seeds:
      - Ask which single technique they would reach for first and why.
      - Push for the role of initialization versus normalization.

  - question: >-
      When would you choose SGD with momentum over Adam, and what does AdamW change?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        Adam adapts the step size per parameter from first and second moment estimates, so it is the
        robust default with fast early progress and little tuning. A well-tuned SGD with momentum can
        still generalize slightly better on vision tasks, so I would consider it when I can afford a
        schedule search. AdamW fixes weight decay: adding L2 to the loss inside Adam gets rescaled by
        the adaptive denominator, so it is not true weight decay — AdamW applies decay directly.
      - >-
        Practically: transformers get AdamW plus warmup almost by default, and if I switch optimizer
        families I retune the learning rate from scratch, because Adam and SGD operate at completely
        different scales — carrying the rate across is a silent way to wreck a run.
    difficulty: 3
    expected_concepts: [deep_learning_optimizers]
    follow_up_seeds:
      - Ask why L2 regularization inside Adam is not equivalent to weight decay.

  - question: >-
      Explain how dropout behaves at training versus inference time. What bug does forgetting eval
      mode cause?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        During training, dropout zeroes each activation with probability p and scales the survivors
        by one over one-minus-p, so the expected activation matches inference; at inference it is
        off and the network is deterministic. Each forward pass trains a random subnetwork, which
        prevents co-adaptation and acts like an implicit ensemble.
      - >-
        If you forget to switch to eval mode, dropout keeps firing in production: predictions get
        noisy, the same input returns different outputs, and evaluation metrics fluctuate between
        identical runs — a classic hard-to-spot bug because nothing crashes.
    difficulty: 1
    expected_concepts: [deep_learning_dropout]
    follow_up_seeds:
      - Ask why the surviving activations are scaled by 1/(1−p) during training.

  - question: >-
      Why did attention replace recurrence for long sequences? Include the cost that came with it.
    rubric:
      weights: {correctness: 0.35, depth: 0.3, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.0}
    answers:
      - >-
        Self-attention connects any two positions directly, so the path between distant tokens is
        constant-length instead of n recurrent steps — the gradient no longer has to survive n
        multiplications for the model to relate them, and training parallelizes across the whole
        sequence instead of stepping through it. The price is quadratic time and memory in sequence
        length, and attention is permutation-invariant, so position must be injected explicitly.
      - >-
        That quadratic cost is exactly why long-context work exists: sparse and sliding-window
        attention, linear-attention approximations — they all trade some of the anywhere-to-anywhere
        connectivity back for sub-quadratic scaling.
    difficulty: 4
    expected_concepts: [deep_learning_attention]
    follow_up_seeds:
      - Push for what "path length" means for gradient flow between distant tokens.

  - question: >-
      You have 2,000 labeled examples and a pretrained backbone. Do you fine-tune everything or
      freeze it and train a head? How do you decide?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        With that little data and a domain close to pretraining, I freeze the backbone and train only
        the head — few trainable parameters, low overfitting risk. If my domain is far from the
        pretraining data, frozen features underfit, so I fine-tune deeper layers at a low learning
        rate to adapt without destroying the pretrained representations — catastrophic forgetting is
        the failure mode. Gradual unfreezing or adapters like LoRA are the middle ground.
      - >-
        One thing I always match is the backbone's own preprocessing — the same tokenizer or input
        normalization it was pretrained with. A mismatch there silently costs more accuracy than the
        freeze-versus-fine-tune decision itself.
    difficulty: 2
    expected_concepts: [deep_learning_transfer_learning]
    follow_up_seeds:
      - Ask what catastrophic forgetting is and which knob controls it.

  - question: >-
      Your transformer's training loss spikes to NaN within the first few hundred steps. What is your
      debugging order?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Optimization first: early divergence usually means the peak learning rate is too high or
        warmup is missing — Adam's moment estimates are noisy in the first steps, which is exactly
        when warmup protects the run — plus gradient clipping if it is absent. Then data: a corrupt
        batch, bad labels, or a division by zero in the loss. Then numerics: mixed-precision overflow
        and loss scaling.
      - >-
        To separate those quickly I log the gradient norm — a spike right before the NaN points at
        optimization, not data — and I replay the exact batch where it blew up; if that batch is
        innocent in isolation, it was the schedule, not the data.
    difficulty: 3
    expected_concepts: [deep_learning_lr_schedules]
    follow_up_seeds:
      - Ask why warmup specifically stabilizes Adam early in training.

  - question: >-
      Deep networks can memorize completely random labels, yet they generalize on real data. How do
      you reconcile that, and what does it change in practice?
    rubric:
      weights: {correctness: 0.35, depth: 0.3, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.0}
    answers:
      - >-
        The memorization result shows raw capacity cannot be what controls generalization. What fills
        the gap is the training process and the architecture: SGD's implicit bias and priors like
        convolutional locality steer learning toward simple, flat solutions when the data actually
        has structure — memorization is the fallback when there is none to find.
      - >-
        Double descent sharpens it: test error can come back down as the model grows past the point
        of fitting the training set. So in practice I do not shrink a model out of overfitting fear —
        I scale it, regularize properly, and let measured validation error overrule parameter-count
        intuition.
    difficulty: 5
    expected_concepts: [deep_learning_generalization]
    follow_up_seeds:
      - Ask what double descent implies for choosing model size.

mlops:
  - question: >-
      How would you monitor a production model for data drift and decide when retraining is actually
      justified?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would track input distributions, prediction distributions, calibration, and delayed
        ground-truth metrics. Drift alone is a signal, not an automatic retrain trigger; I would compare
        it with business impact, model quality degradation, and retraining risk before promoting a new
        model.
      - >-
        Concretely I alert on population-stability index and prediction-distribution shifts, but gate
        retraining on a measured drop in the delayed ground-truth metric versus its baseline, because
        covariate drift without an accuracy hit usually does not justify the retraining and
        redeployment risk.
    difficulty: 3
    expected_concepts: [mlops_drift_monitoring]
    follow_up_seeds:
      - Ask what specifically gates retraining beyond a drift alert firing.

  - question: >-
      How would you roll out a new model version safely, and how would you detect and roll back a
      regression?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would shadow the new model first, then canary it on a small traffic slice behind a feature
        flag, watch live and offline metrics, and promote gradually with an automatic rollback if
        guardrail metrics regress.
      - >-
        The rollback trigger is a guardrail metric (latency p99, error rate, and the business KPI proxy)
        breaching a preset threshold versus the control arm; I keep the previous version warm so the
        flag flips back instantly, and I log the canary verdict for the post-mortem.
    difficulty: 2
    expected_concepts: [mlops_model_rollout]
    follow_up_seeds:
      - Ask for the exact metric and threshold that triggers an automatic rollback.

  - question: >-
      A model scores well in a notebook but degrades in production. How would you make the pipeline
      reproducible and catch this class of failure early?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        Usually it is training-serving skew or a non-reproducible pipeline. I would pin data and code
        versions, track experiments, and add an offline/online consistency check so the same features
        and preprocessing run in both places.
      - >-
        Concretely: version the dataset and feature definitions, log the features actually served and
        replay them offline to catch skew, and run a pre-promotion evaluation on a frozen holdout in CI
        so a regression is caught before traffic ever sees it.
    difficulty: 4
    expected_concepts:
      [mlops_drift_monitoring, mlops_model_rollout, mlops_experiment_tracking, mlops_data_validation]
    follow_up_seeds:
      - Probe the single most likely cause of train/prod divergence and the check for it.
      - Ask what they version to make a run reproducible.

  - question: >-
      A teammate asks "which data and code produced the model that is in production right now?" What
      infrastructure makes that answerable in minutes?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        Experiment tracking plus a model registry. Every training run logs its git SHA, data version,
        hyperparameters, environment, and metrics; the registry stages models and keeps lineage from
        the production model back to the run that produced it. Without that lineage, debugging and
        rollback are guesswork.
      - >-
        The flow that makes it work: promotion is a registry transition, never a file copy — the
        deployed artifact carries its run ID, the run records the dataset snapshot hash and commit,
        so the answer is one lookup. If answering takes archaeology, the incident response will too.
    difficulty: 2
    expected_concepts: [mlops_experiment_tracking]
    follow_up_seeds:
      - Ask what exactly gets logged per training run to make it reproducible.

  - question: >-
      What does CI/CD look like for an ML pipeline compared to a normal service, and where does
      continuous training fit?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        Everything a service has, plus three ML-specific layers: data validation, tests of the
        training pipeline itself, and a pre-promotion evaluation gate — the candidate model must beat
        or match the champion on a frozen holdout before it ships. Continuous training automates
        retraining on a trigger like drift, a schedule, or fresh labels, but every retrained model
        still passes the same gate.
      - >-
        The gate checks more than the headline metric: guardrails like latency, calibration, and
        performance on critical slices — a model that wins on average but regresses an important
        slice gets rejected. And the pipeline is a versioned artifact, so a retrain is one trigger,
        not a notebook ritual.
    difficulty: 3
    expected_concepts: [mlops_ci_cd_models]
    follow_up_seeds:
      - Ask what the promotion gate checks beyond the headline metric.

  - question: >-
      An upstream team changed a column's unit and your model quietly degraded for two weeks. What
      should have caught it, and where?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        Data validation at the ingestion boundary: schema and distribution checks against a reference
        profile — a unit change shows up immediately as a range and mean shift on that column. The
        pipeline should fail loud or quarantine the partition, not let it flow into features. Most
        production ML incidents are exactly this: data incidents, not model incidents.
      - >-
        I would put expectation checks at every boundary — ingestion, feature-pipeline output,
        serving input — with feature-drift monitoring as the last line of defense, and the alert
        must name the violated expectation and page the owning team, otherwise it is two weeks of
        silence again.
    difficulty: 2
    expected_concepts: [mlops_data_validation, mlops_drift_monitoring]
    follow_up_seeds:
      - Ask which pipeline boundary the check belongs at and who gets paged.

  - question: >-
      Your offline metric improved by 3%, but the A/B test shows no business lift. What explains the
      gap, and what do you trust?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        The offline evaluation ran on logged data that the old model chose to show, so it inherits
        selection bias; on top of that the proxy metric may not track the business outcome, and the
        distribution may have shifted since the log. The trust hierarchy is A/B test above off-policy
        estimates above offline holdout — so I believe the A/B.
      - >-
        Before killing the model I check the test was adequately powered and the guardrails were
        flat, and for ranking changes I would use interleaving for cheap sensitivity. Then the real
        work: realign the offline metric with the online KPI, because iterating offline against a
        misaligned metric just manufactures more phantom gains.
    difficulty: 4
    expected_concepts: [mlops_online_evaluation]
    follow_up_seeds:
      - Probe why evaluating on data logged under the old policy biases the offline estimate.

  - question: >-
      When is batch inference the right serving choice over a real-time endpoint?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        Whenever the product tolerates staleness up to the recompute interval: nightly
        recommendations, churn scores, lead ranking. You precompute predictions on a schedule and
        serve them from a table by key — no latency budget, no autoscaling, the simplest operational
        surface. I default to batch until real-time earns its cost.
      - >-
        What forces real-time is a feature that only exists at request time — the current session,
        the query text — or freshness that is product-critical. That switch buys you feature-freshness
        pipelines, tail-latency work, and autoscaling, so it should be a deliberate trade, not the
        default architecture.
    difficulty: 1
    expected_concepts: [mlops_serving_modes]
    follow_up_seeds:
      - Ask what forces a move from batch to real-time serving.

  - question: >-
      Your fraud model's labels arrive 60 days late, and the model itself decides which transactions
      get blocked. What does this do to evaluation and retraining?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        Two problems compound. Label delay means today's quality is only measurable in 60 days, so
        evaluation windows must match label maturity. Worse, the labels are censored by the model's
        own actions: a blocked transaction never reveals whether it was actually fraud, so retraining
        on the filtered stream inherits that selection bias — the model shapes its own future
        training data.
      - >-
        The standard escape is paying for unbiased data: keep a small exploration or holdout slice of
        traffic the model does not filter, use importance weighting when reusing logged decisions,
        and monitor early proxy signals while the true labels mature so a regression is not invisible
        for two months.
    difficulty: 5
    expected_concepts: [mlops_feedback_loops]
    follow_up_seeds:
      - Ask how they would get unbiased labels when the model blocks the very outcomes it needs to learn from.

  # --- Forge-admitted 2026-07-11 (issue 0028), human-reviewed and merged 2026-07-19 (R-33, GH #88).
  # answers[0] are the admission-tested strong exemplars kept verbatim; answers[1] are
  # hand-written Follow-up replies. The weak admission answers remain in
  # data/forge/review-queue-2026-07-11.yaml as bench-label material (ADR 0009 addendum b).
  - question: You own a fraud model that is deployed in real time. Two weeks after launch, the business
      reports a small but steady drop in approval quality, but the offline validation metrics from the
      last training run still look strong. How would you design a monitoring and retraining plan that
      distinguishes data drift from label delay, and what signals would trigger a retrain versus a rollback?
    rubric:
      weights:
        correctness: 0.3
        depth: 0.3
        communication: 0.1
        system_thinking: 0.3
        mlops_awareness: 0.3
    answers:
    - 'I’d separate the problem into three streams: model performance, feature/data drift, and label availability.


      1) Monitoring design

      - Online business KPI: approval quality, fraud loss rate, chargeback rate, false positive rate on
      reviewed cases, and segment-level metrics by channel, geography, merchant type, device, etc. This
      is the earliest signal that the deployed policy is hurting the business.

      - Input drift: track feature distributions and missingness in real time against the training baseline
      using PSI/KS/JS divergence, plus embedding drift if we have high-cardinality categorical features.
      I’d monitor both marginal drift and key joint slices, because a feature can look stable marginally
      while a segment shifts materially.

      - Score drift and calibration: monitor the score distribution, acceptance rate at fixed threshold,
      and calibration on delayed labels once they arrive. A stable AUC offline does not guarantee the
      live score distribution or threshold behavior is stable.

      - Label delay handling: build a label-lag dashboard that shows how many transactions have matured
      enough to be labeled, the age distribution of labels, and performance on the subset with complete
      labels. I’d use survival/lag-aware reporting so we don’t mistake “no labels yet” for “no degradation.”


      2) Distinguishing drift from label delay

      - If business KPIs worsen immediately, but feature distributions and score distributions are stable,
      I’d suspect threshold miscalibration, policy interaction, or label delay rather than covariate drift.

      - If feature drift appears first, and the degradation shows up later when labels mature, that points
      to data drift causing true performance loss.

      - To separate them quantitatively, I’d compare three cohorts: recent live traffic with no labels
      yet, recent traffic with matured labels, and a stable historical holdout. If the unlabeled cohort
      drifts but the matured-label cohort has not yet degraded, the issue is likely label lag. If both
      drift and matured-label performance degrade, that is stronger evidence of real concept/covariate
      shift.

      - I’d also monitor prediction-to-label delay by segment, because fraud labels often arrive later
      for some merchants or dispute types; uneven delay can create a false impression of segment-specific
      drift.


      3) Retrain vs rollback triggers

      - Retrain trigger: sustained feature drift above threshold in important features, plus confirmed
      degradation on matured labels or calibration error beyond tolerance. I’d require persistence over
      multiple windows to avoid reacting to noise, and I’d retrain on a rolling window that matches the
      current fraud regime, with time-based splits and recent data weighting if the fraud pattern is nonstationary.

      - Rollback trigger: a sharp post-deploy drop in business KPI or a clear bug-like signature, such
      as a sudden score distribution collapse, missing feature spike, schema mismatch, or a segment-wide
      failure that started exactly at release. That suggests a serving or feature pipeline issue, so I’d
      revert to the last known-good model while investigating.

      - If the model is stable but the threshold is wrong because base rates changed, I’d prefer threshold
      recalibration or policy adjustment before a full retrain.


      4) Operational plan

      - Set alert tiers: warning for drift, investigation for KPI degradation, and rollback for severe
      or abrupt regressions.

      - Keep a champion/challenger setup so a candidate retrain can be shadow-evaluated before promotion.

      - After retraining, compare against the current model on the same delayed-label cohort and require
      improvement in both business KPI and calibration, not just offline AUC.


      In short: use real-time drift and score monitoring to detect input shift early, use lag-aware label
      tracking to avoid false alarms from delayed fraud outcomes, retrain when drift is persistent and
      confirmed by matured labels, and rollback when the change looks abrupt or operationally broken rather
      than like gradual data shift.'
    - 'First the signals that exist before any label matures: the live score distribution and acceptance
      rate at the current threshold, feature-drift statistics on the top features by importance, and pipeline
      health — missingness spikes and schema mismatches. Those catch most incidents in the first hour;
      label-dependent metrics mature weeks later by construction, so they confirm a diagnosis rather than
      detect the incident.'
    difficulty: 4
    expected_concepts:
    - mlops_drift_monitoring
    - mlops_feedback_loops
    - mlops_model_rollout
    follow_up_seeds:
    - Ask what they would monitor in the first hour, before any fraud label has matured.
    - Ask how delayed labels change the retrain-versus-rollback decision.
    - Ask when they would roll back instead of retraining.
  - question: A team wants to add CI/CD to an ML pipeline that trains a churn model daily, validates data
      at each boundary, and publishes models to a registry. Describe the pipeline stages you would automate,
      the checks you would place before training and before deployment, and how experiment tracking and
      lineage should be used to make a failed release reproducible.
    rubric:
      weights:
        correctness: 0.3
        depth: 0.3
        communication: 0.1
        system_thinking: 0.3
        mlops_awareness: 0.3
    answers:
    - 'I’d automate the pipeline as a set of gated stages: 1) source/data ingestion, 2) data validation
      and feature generation, 3) training, 4) evaluation and model comparison, 5) packaging and registry
      publish, and 6) deployment/rollback. Each stage should emit artifacts and metadata so the run is
      fully traceable.


      Before training, I’d validate the input data at the boundary: schema checks, type/range constraints,
      missingness thresholds, categorical domain checks, duplicate/key integrity, and basic distribution
      checks against the previous day or a reference window. I’d also validate feature availability to
      prevent leakage, for example ensuring labels or post-event fields are not present in training features.
      If the data fails, the pipeline should stop before training so we don’t waste compute or register
      a model trained on bad inputs.


      During training, I’d log the exact code version, container image, hyperparameters, random seed,
      training dataset snapshot/version, and environment details to an experiment tracker. I’d also log
      metrics like AUC, calibration, recall at a business threshold, and slice metrics for important cohorts.
      That gives us a reproducible record of what was tried and why a model was selected.


      Before deployment, I’d gate on both offline quality and release safety. Concretely: compare the
      candidate to the current production model on a fixed holdout set, require minimum metric thresholds,
      check for regressions on key slices, verify calibration and latency/size constraints, and run a
      shadow or canary check if the serving path is involved. I’d also validate the model artifact itself:
      schema of inputs/outputs, serialization compatibility, and that the registry entry points to the
      exact immutable artifact that passed evaluation. If the candidate is worse than baseline or violates
      a business constraint, it should stay in the registry as a versioned artifact but not be promoted.


      For lineage, I’d record end-to-end provenance: raw data version, feature pipeline version, training
      code commit, environment/container digest, parameters, metrics, and the parent-child links between
      dataset -> features -> model -> deployment. That way, if a release fails in production, I can reproduce
      it by checking out the same code, pulling the same data snapshot and feature definitions, and rerunning
      the exact experiment from the tracker. The lineage graph also helps answer “what changed?” when
      a daily retrain causes drift or a metric drop, because I can diff the new run against the last good
      one and isolate whether the cause was data, features, code, or hyperparameters.'
    - 'Ingestion to features: schema, types, ranges, key integrity, missingness against a reference window.
      Features to training: leakage checks — no post-event fields, a label-availability audit — plus feature
      coverage so training-time features exist at serving time. Training to registry: metric thresholds
      against the current champion on a fixed holdout, slice regressions, calibration, artifact schema.
      Registry to deploy: serialization compatibility, latency and size budgets, and a canary gate with
      automatic rollback criteria.'
    difficulty: 4
    expected_concepts:
    - mlops_ci_cd_models
    - mlops_data_validation
    - mlops_experiment_tracking
    follow_up_seeds:
    - Ask which checks run at each pipeline boundary and which of them block training.
    - Ask what metadata the registry must store for a failed release to be reproducible.
    - Ask how they would reproduce a bad model version from lineage alone.
  - question: 'You are choosing how to evaluate and serve a recommendation model for a product with three
      usage patterns: nightly batch scoring for email, low-latency real-time ranking in the app, and a
      streaming feature pipeline for fresh events. How would you compare offline and online evaluation
      for this system, and what rollout strategy would you use to safely move from an offline-approved
      model to production across these serving modes?'
    rubric:
      weights:
        correctness: 0.3
        depth: 0.4
        communication: 0.1
        system_thinking: 0.3
        mlops_awareness: 0.3
    answers:
    - 'I’d separate the problem into three evaluation/serving loops, because each mode has different latency,
      freshness, and failure risks.


      1) Offline evaluation: use it to screen candidates, not to declare victory.

      - For the nightly batch email scorer, offline metrics like AUC, log loss, calibration, and top-k
      lift on a time-based holdout are useful because the model is consumed in a delayed, non-interactive
      way.

      - For real-time ranking, offline ranking metrics such as NDCG@k, MAP, recall@k, and calibration
      still matter, but they are only proxies. The key is to evaluate on a temporally correct split and
      with the same feature availability you will have online, otherwise you get leakage from future events
      or from features that won’t exist at request time.

      - For the streaming feature pipeline, offline evaluation should also check feature freshness and
      point-in-time correctness: whether the feature values at prediction time match what the online store
      would have produced. A model can look great offline and fail online if the streaming pipeline introduces
      delay, missing events, or different aggregation windows.


      2) Online evaluation: use it to validate the real system behavior.

      - In the app, online A/B testing is the gold standard because it captures user feedback loops, latency,
      ranking position bias, and business metrics like CTR, conversion, retention, and revenue. Offline
      ranking gains often do not translate because the model changes what users see, which changes the
      data distribution.

      - For email batch scoring, online evaluation is usually slower and more delayed: compare open/click/conversion
      rates, unsubscribe rate, and downstream revenue by holdout cohort. Since delivery is nightly, you
      can run a controlled experiment at the campaign or user level.

      - For the streaming pipeline, online checks should include operational metrics: event lag, feature
      staleness, missing-rate, and end-to-end prediction latency, because a model can be statistically
      good but operationally unusable if the freshest features arrive too late.


      3) Rollout strategy: progressive, mode-specific, and gated by both model quality and system health.

      - First, validate offline with a time-split backtest and a shadow deployment that replays live traffic
      without affecting users. This catches schema mismatches, feature drift, and latency issues before
      exposure.

      - Then do a canary or small-slice rollout per serving mode. For the app, start with a tiny percentage
      of traffic and compare against control using guardrail metrics: latency p95/p99, error rate, CTR,
      conversion, and complaint/uninstall rates. For email, start with a small user segment or a subset
      of campaigns. For streaming features, deploy the feature pipeline first in parallel, compare online
      feature values against the existing pipeline, and only then switch the model to consume it.

      - Use a staged promotion: shadow -> canary -> A/B test -> full rollout. Keep automatic rollback
      if guardrails regress, especially if the model improves offline but hurts latency, calibration,
      or downstream business metrics.

      - I would also version the model and features together, because a recommendation model is only as
      good as the feature pipeline feeding it. If the streaming features change, I’d treat that as a coupled
      release and require the same point-in-time validation and monitoring.


      In short: offline evaluation tells me whether the model is promising under historical data; online
      evaluation tells me whether the whole recommendation system works under real traffic. I’d use offline
      metrics to narrow candidates, then roll out gradually with shadowing, canaries, and A/B tests, with
      separate guardrails for batch email, real-time ranking, and streaming freshness.'
    - 'Offline you get proxy ranking quality: NDCG@k, recall@k, calibration on a time-correct holdout.
      Online the metric is the feedback loop itself — CTR, conversion, retention, revenue per session
      — plus the operational set offline cannot see: p99 latency, feature staleness, event lag. The tell
      is offline gains that do not reproduce online; that is usually position bias or a feature-freshness
      gap, which is why the A/B with guardrails makes the promote decision, not the offline table.'
    difficulty: 5
    expected_concepts:
    - mlops_online_evaluation
    - mlops_serving_modes
    - mlops_model_rollout
    follow_up_seeds:
    - Ask which metrics differ between offline and online evaluation and why the gap appears.
    - Ask how they would stage the rollout across the three serving modes.
    - Ask what rollback signals they would define per serving mode.

system_design:
  - question: >-
      Design a high-level architecture for an online feature store used by a real-time ML ranking
      service. What consistency risks matter?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would separate offline feature computation from a low-latency online store, enforce shared
        feature definitions, and monitor freshness. The main consistency risks are training-serving
        skew, stale online values, and partial backfills changing historical semantics.
      - >-
        I close the skew gap by computing online and offline features from one declarative definition
        and logging served feature values for point-in-time-correct training; freshness I bound with a
        TTL plus a staleness metric so a lagging stream surfaces as an alert rather than silently
        degrading ranking quality.
    difficulty: 4
    expected_concepts: [system_design_feature_store]
    follow_up_seeds:
      - Ask how they guarantee point-in-time-correct features for training.

  - question: >-
      Design the serving path for a recommendation API under a strict p99 latency budget. What do you
      cache, and what breaks under load?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would precompute candidate sets offline, cache user and item embeddings in a low-latency
        store, and do only light reranking online. Under load the tail latency and cache misses are
        what break the budget.
      - >-
        I protect the p99 with a candidate cache keyed by user segment, request hedging, and a timeout
        that falls back to a cheaper popularity ranker; the failure mode under load is a cold-cache
        stampede, so I add request coalescing and stale-while-revalidate rather than letting every miss
        hit the model.
    difficulty: 3
    expected_concepts: [system_design_serving_latency]
    follow_up_seeds:
      - Ask what specifically breaks the p99 under a cold cache and how they prevent it.

  - question: >-
      Your inference API is getting more requests than it can serve. How do you design the system to
      degrade gracefully instead of falling over?
    rubric:
      weights: {correctness: 0.3, depth: 0.2, communication: 0.15, system_thinking: 0.25, mlops_awareness: 0.1}
    answers:
      - >-
        I would put backpressure in front of the model: bounded queues, admission control, and load
        shedding so excess load is rejected fast instead of piling up. A timeout plus a cheaper
        fallback keeps latency bounded.
      - >-
        Concretely I cap the in-flight queue and shed or rate-limit at the edge once it fills, return a
        degraded-but-fast response (cached or a lighter model) past a deadline, and use retry budgets
        so clients do not amplify the overload — the system sheds load predictably rather than
        collapsing.
    difficulty: 2
    expected_concepts: [system_design_backpressure]
    follow_up_seeds:
      - Ask what they shed first and how they avoid a retry storm.
      - Probe the difference between queueing and load shedding under sustained overload.

  - question: >-
      Design the data pipeline feeding a fraud model whose features must be fresh within a minute.
      Batch, streaming, or both — and why?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        The one-minute freshness bound forces a streaming path — a replayable log like Kafka into a
        stream processor maintaining the recent aggregates — while heavy historical features can stay
        batch. Streaming brings its own physics: event time versus processing time, late events
        handled with watermarks, and state that must be managed and recovered.
      - >-
        I lean kappa rather than lambda: one streaming codepath over a replayable log, with backfill
        done by replaying it. The lambda shape — duplicate batch and stream implementations of the
        same feature — is the classic way the two silently drift and the model trains on one
        definition while serving another.
    difficulty: 3
    expected_concepts: [system_design_streaming_pipelines]
    follow_up_seeds:
      - Ask how they handle late-arriving events without corrupting the aggregates.

  - question: >-
      Your payment events are delivered at-least-once. How do you keep duplicates from double-charging
      customers downstream?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.25, mlops_awareness: 0.05}
    answers:
      - >-
        Make the consumer idempotent instead of trusting delivery: every charge carries an idempotency
        key, and the consumer upserts against it or checks a dedup store, so processing the same event
        twice has no second effect. I design assuming duplicates and reordering are normal, because
        under at-least-once they are.
      - >-
        End-to-end exactly-once is engineered, not switched on: broker-level exactly-once does not
        survive into side effects like charging a card. For the write-plus-publish atomicity I use a
        transactional outbox, and I size the dedup window to the realistic redelivery horizon.
    difficulty: 4
    expected_concepts: [system_design_delivery_semantics]
    follow_up_seeds:
      - Probe why "exactly-once delivery" from the broker alone does not save the consumer.

  - question: >-
      Traffic to your model API doubles every month. What has to be true about the service so you can
      scale it by just adding replicas?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.2, system_thinking: 0.2, mlops_awareness: 0.05}
    answers:
      - >-
        It has to be stateless: any session or application state lives in an external store, so any
        replica can serve any request and a load balancer can spread traffic freely. Then autoscaling
        on a saturation signal — CPU, queue depth, or in-flight concurrency — handles the doubling.
      - >-
        The catch is that replicas just relocate the bottleneck: the shared database is usually what
        breaks first. Reads scale with replicas and caches, writes need partitioning or sharding — the
        stateless fleet is the easy tier; the stateful one is the actual design problem.
    difficulty: 1
    expected_concepts: [system_design_scaling_basics]
    follow_up_seeds:
      - Ask what breaks first when replicas scale but the database does not.

  - question: >-
      Design semantic search over 50 million documents with a 100ms latency budget. Why not exact
      nearest neighbor, and what operational problems does the index bring?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        An exact scan over 50 million vectors cannot meet 100ms, so I use an approximate
        nearest-neighbor index — HNSW or IVF — which trades a small recall loss for orders of
        magnitude in latency, tuned as recall-at-k versus latency. Documents and queries are embedded
        with the same model, and the index serves the top candidates for reranking.
      - >-
        Operationally the index is a living thing: it needs rebuild or incremental refresh as content
        changes, HNSW is memory-hungry, metadata filters interact with the graph traversal, and the
        embedding model version must be pinned — vectors from two model versions in one index do not
        share a geometry, so similarity quietly stops meaning anything.
    difficulty: 3
    expected_concepts: [system_design_vector_search]
    follow_up_seeds:
      - Ask what goes wrong if two embedding-model versions write into one index.

  - question: >-
      Design rate limiting for a public API. Which algorithm, where does it live, and what does the
      client experience?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.2, system_thinking: 0.2, mlops_awareness: 0.05}
    answers:
      - >-
        Token bucket: capacity allows short bursts, the refill rate enforces the sustained limit. It
        lives at the edge — the API gateway — so excess load is rejected before it costs backend
        resources. The client gets a 429 with Retry-After so well-behaved callers back off cleanly.
      - >-
        Distributed enforcement is the interesting part: either shared counters in something like
        Redis, or per-node quotas with coordination, trading accuracy against a dependency on the
        shared store. And server-side limits need client retry budgets to match, or synchronized
        retries turn one blip into a storm.
    difficulty: 2
    expected_concepts: [system_design_rate_limiting]
    follow_up_seeds:
      - Ask how the limiter itself avoids becoming a single point of failure.

  - question: >-
      Your feature store is replicated across two regions and a network partition hits mid-traffic.
      Walk me through the consistency choices and what your ranking model actually experiences.
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.25, mlops_awareness: 0.05}
    answers:
      - >-
        Under a partition, CAP forces the choice: stay available and serve possibly stale features, or
        stay consistent and reject or time out. For ranking, bounded staleness is usually the right
        trade — a slightly old feature beats an error page — so I serve stale and surface it. PACELC
        adds that even without partitions, synchronous replication buys consistency at a latency cost.
      - >-
        The operational requirements: bound the staleness with a TTL and a staleness metric so the
        degradation is observable, and watch version skew — a feature version in one region paired
        with a model version trained on another. Silent stale features look exactly like slow model
        decay, which is the worst possible failure signature.
    difficulty: 5
    expected_concepts: [system_design_replication_consistency, system_design_feature_store]
    follow_up_seeds:
      - Ask how bounded staleness is enforced and observed rather than assumed.

vietnamese_nlp:
  - question: >-
      What makes Vietnamese word segmentation important for NLP models, and when might a subword
      transformer reduce that need?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Vietnamese uses spaces between syllables, not always words, so segmentation changes the units
        seen by classical models and affects named entities and phrase meaning. Subword transformers
        reduce the hard dependency, but domain text and tokenization quality still matter.
      - >-
        A compound like 'học máy' is two syllables but one concept, so a syllable-level model can split
        the entity; subword transformers learn the merge from data, yet a tokenizer trained mostly on
        English fragments Vietnamese badly, so in-domain subword vocab and diacritic-correct input still
        carry the result.
    difficulty: 3
    expected_concepts: [vietnamese_nlp_word_segmentation, vietnamese_nlp_vncorenlp]
    follow_up_seeds:
      - Ask for a compound-word example where syllable splitting breaks an entity.

  - question: >-
      How would you handle diacritic restoration for noisy Vietnamese user text, and why does it matter
      downstream?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Users often type without diacritics, so 'toi di hoc' is ambiguous; I would restore diacritics
        with a sequence model before downstream NLP, because the un-accented form collapses distinct
        words and wrecks meaning.
      - >-
        I frame it as sequence labeling or seq2seq over syllables trained on accented text with
        synthetic accent-stripping for parallel data; it matters because 'ma' maps to several words
        (ma, má, mà, mã, mạ), so skipping restoration pushes that ambiguity into every downstream
        classifier and degrades NER and intent detection.
    difficulty: 2
    expected_concepts: [vietnamese_nlp_diacritic_restoration]
    follow_up_seeds:
      - Ask how they build parallel data for the restoration model.

  - question: >-
      For a Vietnamese text classifier (e.g. a Zalo-style intent task), why might PhoBERT beat a
      multilingual model, and what preprocessing does it assume?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        PhoBERT is pre-trained on Vietnamese, so it has better in-language representations than a
        multilingual model that splits its capacity across languages. It assumes the input is
        word-segmented first.
      - >-
        Concretely PhoBERT was trained on word-segmented Vietnamese (e.g. via VnCoreNLP), so I run the
        same segmentation at inference to avoid train/serve mismatch; its in-domain vocabulary and
        monolingual data usually beat mBERT/XLM-R on Vietnamese NER, POS, and sentiment, though a
        multilingual model can still win when I need cross-lingual transfer.
    difficulty: 4
    expected_concepts: [vietnamese_nlp_phobert, vietnamese_nlp_vncorenlp]
    follow_up_seeds:
      - Ask why segmenting the input before PhoBERT matters.
      - Probe when a multilingual model would still be the better choice.

  - question: >-
      Two Vietnamese strings look identical on screen but fail equality checks and dictionary
      lookups. What is going on, and where in the pipeline do you fix it?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        That is Unicode normalization: the same accented character can be encoded precomposed (NFC,
        one code point) or decomposed (NFD, base letter plus combining mark), and different keyboards
        and data sources produce different forms. Vietnamese also has two tone-placement conventions,
        like "hoà" versus "hòa". I normalize to NFC and one tone convention at the very start of the
        pipeline.
      - >-
        And that normalization has to run identically in training and serving — if only one side
        normalizes, the same word becomes two different tokens: dictionary and cache lookups miss,
        word segmentation splits differently, and the tokenizer's out-of-vocabulary rate quietly
        inflates. It is a train/serve skew bug that never throws an error.
    difficulty: 1
    expected_concepts: [vietnamese_nlp_unicode_normalization]
    follow_up_seeds:
      - Ask why the normalization must run in both the training and serving paths.

  - question: >-
      You are building an intent classifier for Zalo-style chat messages full of teencode and mixed
      Vietnamese-English. What do your preprocessing and data strategy look like?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Preprocessing: normalize Unicode, map teencode to standard words with a dictionary plus a
        learned normalizer for the long tail, restore missing diacritics, and keep English tech terms
        as-is rather than translating them. But the bigger lever is data: the training set must come
        from real noisy chat in this domain.
      - >-
        Domain mismatch dominates everything else — a model trained on clean news text collapses on
        chat. So I collect and label real conversations, and augment by teencode-ifying and
        accent-stripping clean text to synthesize more noisy examples. Given a limited budget I would
        buy in-domain labels before more normalization rules.
    difficulty: 3
    expected_concepts: [vietnamese_nlp_teencode, vietnamese_nlp_diacritic_restoration]
    follow_up_seeds:
      - Ask which they would fund first with a limited budget — normalization rules or in-domain labels — and why.

  - question: >-
      Design the end-to-end NLP stack for a Vietnamese customer-support chatbot: normalization,
      segmentation, model choice, and the noisy-input reality. Where do the risky bets hide?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.1}
    answers:
      - >-
        The pipeline: normalize first — NFC Unicode, teencode mapping, diacritic restoration — then
        word segmentation consistent with the model's pretraining, then a PhoBERT fine-tune for
        intent and entities, with a confidence threshold that hands low-certainty turns to a human.
        The risky bets: a train/serve segmentation mismatch that silently degrades PhoBERT, and
        training on formal text when production is noisy chat.
      - >-
        For operations I would evaluate on a held-out set of real chat, not synthetic examples, and
        monitor the intent distribution over time — slang and teencode evolve, so the input drifts
        under a model that looks frozen-perfect on its launch test set.
    difficulty: 5
    expected_concepts: [vietnamese_nlp_phobert, vietnamese_nlp_word_segmentation, vietnamese_nlp_teencode]
    follow_up_seeds:
      - Probe the train/serve segmentation mismatch and how it silently degrades PhoBERT.
