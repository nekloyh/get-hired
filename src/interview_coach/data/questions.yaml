# Question bank for the interview Session (issues 0005 / 0013).
#
# Top-level mapping: canonical Skill -> ordered list of questions. The Supervisor rotates through a
# Skill's questions when it probes the same Skill again, so each Skill needs >= 2 distinct questions
# for an `extra_question` to land on a *different* prompt. The loader enforces >= 1 per Skill.
#
# Each question carries:
#   question:          the prompt put to the Candidate
#   difficulty:        1–5 target level; the Topic Plan's target_difficulty picks the closest match
#                      (optional, defaults to 3). Each Skill spreads its questions across levels so
#                      an easy vs hard target lands on different prompts (issue 0025).
#   rubric.weights:    per-dimension weights over the fixed 5 dimensions
#                      (correctness, depth, communication, system_thinking, mlops_awareness).
#                      Weight 0 disables a dimension so the Evaluator does not score it — e.g. a pure
#                      concept question is not scored on mlops_awareness.
#   answers:           scripted fixture replies; answers[0] answers the question, answers[1:] answer
#                      successive Follow-ups (a weak opener that improves so the micro-loop converges).
#   expected_concepts: concept-note ids (data/concepts.yaml) this question is expected to surface.
#   follow_up_seeds:   hand-written probe starters the Interviewer can lean on.
#
# HITL: questions and rubric weights need human domain review for accuracy and difficulty calibration.

ml_fundamentals:
  - question: >-
      Explain the bias–variance tradeoff and how it guides model selection and regularization. What do
      you watch on the learning curves?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        Bias is error from overly simple assumptions; variance is sensitivity to the particular
        training sample. Expected error decomposes into bias squared, variance, and irreducible noise,
        so lowering one often raises the other. A high-bias model underfits — train and validation
        error are both high and close; a high-variance model overfits — low train error but a wide gap
        to validation. I read learning curves to tell them apart: curves that converge at a high error
        mean I should add capacity or features; a persistent gap means I should regularize. L2 shrinks
        weights to cut variance, L1 also does feature selection, and I tune the strength with
        cross-validation, picking where validation error bottoms out before it climbs again.
      - >-
        Concretely: if I see train MSE 0.1 and validation MSE 0.9, that wide gap is high variance, so I
        add L2, gather more data, or reduce model capacity, and I confirm the gap narrows.
    difficulty: 3
    expected_concepts: [ml_fundamentals_bias_variance]
    follow_up_seeds:
      - Push for a concrete numeric diagnosis from a train/validation error pair.
      - Ask which fix they would try first and why, given a wide generalization gap.

  - question: >-
      Why does L2 regularization reduce overfitting, and how would you choose its strength?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        L2 regularization stops overfitting by making the model simpler. You add it to the loss and it
        makes the weights smaller, which is better. You pick the strength by trying a few values and
        seeing what works.
      - >-
        It adds a penalty proportional to the sum of squared weights, so the optimizer trades a little
        training fit for smaller weights. Smaller weights mean a smoother function that is less
        sensitive to individual training points, which is what lowers variance.
      - >-
        I choose lambda with k-fold cross-validation over a log-spaced grid, picking the value where
        mean validation error is lowest; too large under-fits (bias rises), too small lets variance
        back in, so I look for the bottom of that validation curve.
    difficulty: 2
    expected_concepts: [ml_fundamentals_l2_regularization]
    follow_up_seeds:
      - Probe the penalty-to-variance mechanism, not just "smaller weights".
      - Ask how they would search the regularization strength concretely.

  - question: >-
      Explain how k-fold cross-validation works and when it can still mislead you.
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        You split the data into k folds, train on k-1 and validate on the held-out fold, rotate through
        all k, and average the scores. It gives a more stable estimate than a single split.
      - >-
        It misleads when the folds break an assumption: with time series, random folds leak the future
        into training, so I use forward-chaining splits; with grouped or imbalanced data I use grouped
        or stratified folds; and any preprocessing fit on the whole set before splitting leaks
        information and inflates the score.
    difficulty: 4
    expected_concepts: [ml_fundamentals_cv_leakage]
    follow_up_seeds:
      - Ask for a concrete leakage trap and the fold scheme that avoids it.

deep_learning:
  - question: >-
      Explain why residual connections help train deep neural networks, and name one failure mode they
      do not automatically solve.
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Residual connections let layers learn a delta around an identity path, which improves gradient
        flow and makes very deep networks easier to optimize. They do not by themselves fix data
        leakage, label noise, or poor objective design.
      - >-
        Concretely the skip path keeps the Jacobian close to identity, so gradients reach early layers
        without vanishing; but a wrong loss or leaked features still train a confidently wrong model —
        depth is no longer the bottleneck, the objective is.
    difficulty: 3
    expected_concepts: [deep_learning_residual_connections]
    follow_up_seeds:
      - Ask for the gradient-flow mechanism in terms of the Jacobian.

  - question: >-
      Why does batch normalization speed up training, and when can it behave surprisingly or hurt?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        It normalizes layer inputs per mini-batch, which smooths the loss landscape and lets you use
        higher learning rates. It can misbehave with very small batches and at inference, where it
        switches to running statistics.
      - >-
        With tiny or non-i.i.d. batches the batch statistics are noisy and train/inference skew
        appears, so I switch to group or layer norm; in RNNs and some fine-tuning regimes I freeze the
        running stats to stop them drifting away from the deployment distribution.
    difficulty: 4
    expected_concepts: [deep_learning_batch_normalization]
    follow_up_seeds:
      - Probe the train/inference statistics mismatch and when it bites.

  - question: >-
      What causes vanishing or exploding gradients in deep networks, and what concrete techniques keep
      training stable?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        When you stack many layers, repeated multiplication of Jacobians shrinks gradients toward zero
        or blows them up, so early layers stop learning or training diverges. Skip connections, careful
        initialization, normalization, and gradient clipping all help.
      - >-
        More concretely: residual paths keep the Jacobian near identity so signal reaches early layers;
        He/Xavier initialization keeps activation variance roughly constant across depth; normalization
        rescales activations; and clipping bounds the update norm so a rare huge gradient does not
        destabilize the run.
    difficulty: 2
    expected_concepts: [deep_learning_residual_connections]
    follow_up_seeds:
      - Ask which single technique they would reach for first and why.
      - Push for the role of initialization versus normalization.

mlops:
  - question: >-
      How would you monitor a production model for data drift and decide when retraining is actually
      justified?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would track input distributions, prediction distributions, calibration, and delayed
        ground-truth metrics. Drift alone is a signal, not an automatic retrain trigger; I would compare
        it with business impact, model quality degradation, and retraining risk before promoting a new
        model.
      - >-
        Concretely I alert on population-stability index and prediction-distribution shifts, but gate
        retraining on a measured drop in the delayed ground-truth metric versus its baseline, because
        covariate drift without an accuracy hit usually does not justify the retraining and
        redeployment risk.
    difficulty: 3
    expected_concepts: [mlops_drift_monitoring]
    follow_up_seeds:
      - Ask what specifically gates retraining beyond a drift alert firing.

  - question: >-
      How would you roll out a new model version safely, and how would you detect and roll back a
      regression?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would shadow the new model first, then canary it on a small traffic slice behind a feature
        flag, watch live and offline metrics, and promote gradually with an automatic rollback if
        guardrail metrics regress.
      - >-
        The rollback trigger is a guardrail metric (latency p99, error rate, and the business KPI proxy)
        breaching a preset threshold versus the control arm; I keep the previous version warm so the
        flag flips back instantly, and I log the canary verdict for the post-mortem.
    difficulty: 2
    expected_concepts: [mlops_model_rollout]
    follow_up_seeds:
      - Ask for the exact metric and threshold that triggers an automatic rollback.

  - question: >-
      A model scores well in a notebook but degrades in production. How would you make the pipeline
      reproducible and catch this class of failure early?
    rubric:
      weights: {correctness: 0.3, depth: 0.25, communication: 0.15, system_thinking: 0.15, mlops_awareness: 0.15}
    answers:
      - >-
        Usually it is training-serving skew or a non-reproducible pipeline. I would pin data and code
        versions, track experiments, and add an offline/online consistency check so the same features
        and preprocessing run in both places.
      - >-
        Concretely: version the dataset and feature definitions, log the features actually served and
        replay them offline to catch skew, and run a pre-promotion evaluation on a frozen holdout in CI
        so a regression is caught before traffic ever sees it.
    difficulty: 4
    expected_concepts: [mlops_drift_monitoring, mlops_model_rollout]
    follow_up_seeds:
      - Probe the single most likely cause of train/prod divergence and the check for it.
      - Ask what they version to make a run reproducible.

system_design:
  - question: >-
      Design a high-level architecture for an online feature store used by a real-time ML ranking
      service. What consistency risks matter?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would separate offline feature computation from a low-latency online store, enforce shared
        feature definitions, and monitor freshness. The main consistency risks are training-serving
        skew, stale online values, and partial backfills changing historical semantics.
      - >-
        I close the skew gap by computing online and offline features from one declarative definition
        and logging served feature values for point-in-time-correct training; freshness I bound with a
        TTL plus a staleness metric so a lagging stream surfaces as an alert rather than silently
        degrading ranking quality.
    difficulty: 4
    expected_concepts: [system_design_feature_store]
    follow_up_seeds:
      - Ask how they guarantee point-in-time-correct features for training.

  - question: >-
      Design the serving path for a recommendation API under a strict p99 latency budget. What do you
      cache, and what breaks under load?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        I would precompute candidate sets offline, cache user and item embeddings in a low-latency
        store, and do only light reranking online. Under load the tail latency and cache misses are
        what break the budget.
      - >-
        I protect the p99 with a candidate cache keyed by user segment, request hedging, and a timeout
        that falls back to a cheaper popularity ranker; the failure mode under load is a cold-cache
        stampede, so I add request coalescing and stale-while-revalidate rather than letting every miss
        hit the model.
    difficulty: 3
    expected_concepts: [system_design_serving_latency]
    follow_up_seeds:
      - Ask what specifically breaks the p99 under a cold cache and how they prevent it.

  - question: >-
      Your inference API is getting more requests than it can serve. How do you design the system to
      degrade gracefully instead of falling over?
    rubric:
      weights: {correctness: 0.3, depth: 0.2, communication: 0.15, system_thinking: 0.25, mlops_awareness: 0.1}
    answers:
      - >-
        I would put backpressure in front of the model: bounded queues, admission control, and load
        shedding so excess load is rejected fast instead of piling up. A timeout plus a cheaper
        fallback keeps latency bounded.
      - >-
        Concretely I cap the in-flight queue and shed or rate-limit at the edge once it fills, return a
        degraded-but-fast response (cached or a lighter model) past a deadline, and use retry budgets
        so clients do not amplify the overload — the system sheds load predictably rather than
        collapsing.
    difficulty: 2
    expected_concepts: [system_design_backpressure]
    follow_up_seeds:
      - Ask what they shed first and how they avoid a retry storm.
      - Probe the difference between queueing and load shedding under sustained overload.

vietnamese_nlp:
  - question: >-
      What makes Vietnamese word segmentation important for NLP models, and when might a subword
      transformer reduce that need?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Vietnamese uses spaces between syllables, not always words, so segmentation changes the units
        seen by classical models and affects named entities and phrase meaning. Subword transformers
        reduce the hard dependency, but domain text and tokenization quality still matter.
      - >-
        A compound like 'học máy' is two syllables but one concept, so a syllable-level model can split
        the entity; subword transformers learn the merge from data, yet a tokenizer trained mostly on
        English fragments Vietnamese badly, so in-domain subword vocab and diacritic-correct input still
        carry the result.
    difficulty: 3
    expected_concepts: [vietnamese_nlp_word_segmentation, vietnamese_nlp_vncorenlp]
    follow_up_seeds:
      - Ask for a compound-word example where syllable splitting breaks an entity.

  - question: >-
      How would you handle diacritic restoration for noisy Vietnamese user text, and why does it matter
      downstream?
    rubric:
      weights: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    answers:
      - >-
        Users often type without diacritics, so 'toi di hoc' is ambiguous; I would restore diacritics
        with a sequence model before downstream NLP, because the un-accented form collapses distinct
        words and wrecks meaning.
      - >-
        I frame it as sequence labeling or seq2seq over syllables trained on accented text with
        synthetic accent-stripping for parallel data; it matters because 'ma' maps to several words
        (ma, má, mà, mã, mạ), so skipping restoration pushes that ambiguity into every downstream
        classifier and degrades NER and intent detection.
    difficulty: 2
    expected_concepts: [vietnamese_nlp_diacritic_restoration]
    follow_up_seeds:
      - Ask how they build parallel data for the restoration model.

  - question: >-
      For a Vietnamese text classifier (e.g. a Zalo-style intent task), why might PhoBERT beat a
      multilingual model, and what preprocessing does it assume?
    rubric:
      weights: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    answers:
      - >-
        PhoBERT is pre-trained on Vietnamese, so it has better in-language representations than a
        multilingual model that splits its capacity across languages. It assumes the input is
        word-segmented first.
      - >-
        Concretely PhoBERT was trained on word-segmented Vietnamese (e.g. via VnCoreNLP), so I run the
        same segmentation at inference to avoid train/serve mismatch; its in-domain vocabulary and
        monolingual data usually beat mBERT/XLM-R on Vietnamese NER, POS, and sentiment, though a
        multilingual model can still win when I need cross-lingual transfer.
    difficulty: 4
    expected_concepts: [vietnamese_nlp_phobert]
    follow_up_seeds:
      - Ask why segmenting the input before PhoBERT matters.
      - Probe when a multilingual model would still be the better choice.
