- question: You own a fraud model that is deployed in real time. Two weeks after launch, the business
    reports a small but steady drop in approval quality, but the offline validation metrics from the last
    training run still look strong. How would you design a monitoring and retraining plan that distinguishes
    data drift from label delay, and what signals would trigger a retrain versus a rollback?
  difficulty: 4
  rubric:
    weights:
      correctness: 3.0
      depth: 3.0
      communication: 1.0
      system_thinking: 3.0
      mlops_awareness: 3.0
  answers:
  - 'I’d separate the problem into three streams: model performance, feature/data drift, and label availability.


    1) Monitoring design

    - Online business KPI: approval quality, fraud loss rate, chargeback rate, false positive rate on
    reviewed cases, and segment-level metrics by channel, geography, merchant type, device, etc. This
    is the earliest signal that the deployed policy is hurting the business.

    - Input drift: track feature distributions and missingness in real time against the training baseline
    using PSI/KS/JS divergence, plus embedding drift if we have high-cardinality categorical features.
    I’d monitor both marginal drift and key joint slices, because a feature can look stable marginally
    while a segment shifts materially.

    - Score drift and calibration: monitor the score distribution, acceptance rate at fixed threshold,
    and calibration on delayed labels once they arrive. A stable AUC offline does not guarantee the live
    score distribution or threshold behavior is stable.

    - Label delay handling: build a label-lag dashboard that shows how many transactions have matured
    enough to be labeled, the age distribution of labels, and performance on the subset with complete
    labels. I’d use survival/lag-aware reporting so we don’t mistake “no labels yet” for “no degradation.”


    2) Distinguishing drift from label delay

    - If business KPIs worsen immediately, but feature distributions and score distributions are stable,
    I’d suspect threshold miscalibration, policy interaction, or label delay rather than covariate drift.

    - If feature drift appears first, and the degradation shows up later when labels mature, that points
    to data drift causing true performance loss.

    - To separate them quantitatively, I’d compare three cohorts: recent live traffic with no labels yet,
    recent traffic with matured labels, and a stable historical holdout. If the unlabeled cohort drifts
    but the matured-label cohort has not yet degraded, the issue is likely label lag. If both drift and
    matured-label performance degrade, that is stronger evidence of real concept/covariate shift.

    - I’d also monitor prediction-to-label delay by segment, because fraud labels often arrive later for
    some merchants or dispute types; uneven delay can create a false impression of segment-specific drift.


    3) Retrain vs rollback triggers

    - Retrain trigger: sustained feature drift above threshold in important features, plus confirmed degradation
    on matured labels or calibration error beyond tolerance. I’d require persistence over multiple windows
    to avoid reacting to noise, and I’d retrain on a rolling window that matches the current fraud regime,
    with time-based splits and recent data weighting if the fraud pattern is nonstationary.

    - Rollback trigger: a sharp post-deploy drop in business KPI or a clear bug-like signature, such as
    a sudden score distribution collapse, missing feature spike, schema mismatch, or a segment-wide failure
    that started exactly at release. That suggests a serving or feature pipeline issue, so I’d revert
    to the last known-good model while investigating.

    - If the model is stable but the threshold is wrong because base rates changed, I’d prefer threshold
    recalibration or policy adjustment before a full retrain.


    4) Operational plan

    - Set alert tiers: warning for drift, investigation for KPI degradation, and rollback for severe or
    abrupt regressions.

    - Keep a champion/challenger setup so a candidate retrain can be shadow-evaluated before promotion.

    - After retraining, compare against the current model on the same delayed-label cohort and require
    improvement in both business KPI and calibration, not just offline AUC.


    In short: use real-time drift and score monitoring to detect input shift early, use lag-aware label
    tracking to avoid false alarms from delayed fraud outcomes, retrain when drift is persistent and confirmed
    by matured labels, and rollback when the change looks abrupt or operationally broken rather than like
    gradual data shift.'
  - 'I would monitor the model closely and compare the live data to the training data. If the data looks
    different, that means drift, and if the labels are just late then we should wait longer before making
    a decision. I’d also watch approval rate and fraud rate in production.


    If the metrics keep getting worse, I would retrain the model on more recent data. If the drop is sudden,
    I would roll back to the previous model. Basically, drift means retrain and a sudden problem means
    rollback. I’d also check for bugs in the pipeline and maybe add more features if needed.'
  expected_concepts:
  - mlops_drift_monitoring
  - mlops_feedback_loops
  - mlops_model_rollout
  follow_up_seeds:
  - What would you monitor first?
  - How do delayed labels change the decision?
  - When would you roll back instead of retrain?
- question: A team wants to add CI/CD to an ML pipeline that trains a churn model daily, validates data
    at each boundary, and publishes models to a registry. Describe the pipeline stages you would automate,
    the checks you would place before training and before deployment, and how experiment tracking and
    lineage should be used to make a failed release reproducible.
  difficulty: 4
  rubric:
    weights:
      correctness: 3.0
      depth: 3.0
      communication: 1.0
      system_thinking: 3.0
      mlops_awareness: 3.0
  answers:
  - 'I’d automate the pipeline as a set of gated stages: 1) source/data ingestion, 2) data validation
    and feature generation, 3) training, 4) evaluation and model comparison, 5) packaging and registry
    publish, and 6) deployment/rollback. Each stage should emit artifacts and metadata so the run is fully
    traceable.


    Before training, I’d validate the input data at the boundary: schema checks, type/range constraints,
    missingness thresholds, categorical domain checks, duplicate/key integrity, and basic distribution
    checks against the previous day or a reference window. I’d also validate feature availability to prevent
    leakage, for example ensuring labels or post-event fields are not present in training features. If
    the data fails, the pipeline should stop before training so we don’t waste compute or register a model
    trained on bad inputs.


    During training, I’d log the exact code version, container image, hyperparameters, random seed, training
    dataset snapshot/version, and environment details to an experiment tracker. I’d also log metrics like
    AUC, calibration, recall at a business threshold, and slice metrics for important cohorts. That gives
    us a reproducible record of what was tried and why a model was selected.


    Before deployment, I’d gate on both offline quality and release safety. Concretely: compare the candidate
    to the current production model on a fixed holdout set, require minimum metric thresholds, check for
    regressions on key slices, verify calibration and latency/size constraints, and run a shadow or canary
    check if the serving path is involved. I’d also validate the model artifact itself: schema of inputs/outputs,
    serialization compatibility, and that the registry entry points to the exact immutable artifact that
    passed evaluation. If the candidate is worse than baseline or violates a business constraint, it should
    stay in the registry as a versioned artifact but not be promoted.


    For lineage, I’d record end-to-end provenance: raw data version, feature pipeline version, training
    code commit, environment/container digest, parameters, metrics, and the parent-child links between
    dataset -> features -> model -> deployment. That way, if a release fails in production, I can reproduce
    it by checking out the same code, pulling the same data snapshot and feature definitions, and rerunning
    the exact experiment from the tracker. The lineage graph also helps answer “what changed?” when a
    daily retrain causes drift or a metric drop, because I can diff the new run against the last good
    one and isolate whether the cause was data, features, code, or hyperparameters.'
  - 'I would automate the usual CI/CD steps like testing the code, training the model every day, and then
    pushing it to a model registry if it looks good. Before training, I’d do some data checks to make
    sure the data is clean and has the right columns. Before deployment, I’d compare the model to the
    old one and only release it if the metrics are better.


    Experiment tracking should save the metrics and parameters so we can see what happened in each run.
    Lineage is useful because it shows where the data came from and which model version was used. If a
    release fails, we can look at the tracked experiment and rerun it later with the same settings to
    reproduce it.'
  expected_concepts:
  - mlops_ci_cd_models
  - mlops_data_validation
  - mlops_experiment_tracking
  follow_up_seeds:
  - Which checks happen at each boundary?
  - What metadata must be stored in the registry?
  - How would you reproduce a bad model version?
- question: 'You are choosing how to evaluate and serve a recommendation model for a product with three
    usage patterns: nightly batch scoring for email, low-latency real-time ranking in the app, and a streaming
    feature pipeline for fresh events. How would you compare offline and online evaluation for this system,
    and what rollout strategy would you use to safely move from an offline-approved model to production
    across these serving modes?'
  difficulty: 5
  rubric:
    weights:
      correctness: 3.0
      depth: 4.0
      communication: 1.0
      system_thinking: 3.0
      mlops_awareness: 3.0
  answers:
  - 'I’d separate the problem into three evaluation/serving loops, because each mode has different latency,
    freshness, and failure risks.


    1) Offline evaluation: use it to screen candidates, not to declare victory.

    - For the nightly batch email scorer, offline metrics like AUC, log loss, calibration, and top-k lift
    on a time-based holdout are useful because the model is consumed in a delayed, non-interactive way.

    - For real-time ranking, offline ranking metrics such as NDCG@k, MAP, recall@k, and calibration still
    matter, but they are only proxies. The key is to evaluate on a temporally correct split and with the
    same feature availability you will have online, otherwise you get leakage from future events or from
    features that won’t exist at request time.

    - For the streaming feature pipeline, offline evaluation should also check feature freshness and point-in-time
    correctness: whether the feature values at prediction time match what the online store would have
    produced. A model can look great offline and fail online if the streaming pipeline introduces delay,
    missing events, or different aggregation windows.


    2) Online evaluation: use it to validate the real system behavior.

    - In the app, online A/B testing is the gold standard because it captures user feedback loops, latency,
    ranking position bias, and business metrics like CTR, conversion, retention, and revenue. Offline
    ranking gains often do not translate because the model changes what users see, which changes the data
    distribution.

    - For email batch scoring, online evaluation is usually slower and more delayed: compare open/click/conversion
    rates, unsubscribe rate, and downstream revenue by holdout cohort. Since delivery is nightly, you
    can run a controlled experiment at the campaign or user level.

    - For the streaming pipeline, online checks should include operational metrics: event lag, feature
    staleness, missing-rate, and end-to-end prediction latency, because a model can be statistically good
    but operationally unusable if the freshest features arrive too late.


    3) Rollout strategy: progressive, mode-specific, and gated by both model quality and system health.

    - First, validate offline with a time-split backtest and a shadow deployment that replays live traffic
    without affecting users. This catches schema mismatches, feature drift, and latency issues before
    exposure.

    - Then do a canary or small-slice rollout per serving mode. For the app, start with a tiny percentage
    of traffic and compare against control using guardrail metrics: latency p95/p99, error rate, CTR,
    conversion, and complaint/uninstall rates. For email, start with a small user segment or a subset
    of campaigns. For streaming features, deploy the feature pipeline first in parallel, compare online
    feature values against the existing pipeline, and only then switch the model to consume it.

    - Use a staged promotion: shadow -> canary -> A/B test -> full rollout. Keep automatic rollback if
    guardrails regress, especially if the model improves offline but hurts latency, calibration, or downstream
    business metrics.

    - I would also version the model and features together, because a recommendation model is only as
    good as the feature pipeline feeding it. If the streaming features change, I’d treat that as a coupled
    release and require the same point-in-time validation and monitoring.


    In short: offline evaluation tells me whether the model is promising under historical data; online
    evaluation tells me whether the whole recommendation system works under real traffic. I’d use offline
    metrics to narrow candidates, then roll out gradually with shadowing, canaries, and A/B tests, with
    separate guardrails for batch email, real-time ranking, and streaming freshness.'
  - 'I would mostly rely on offline metrics first, like accuracy or AUC, to pick the best recommendation
    model. Then I’d put it into production and see how it does with users. For the email batch job, offline
    evaluation is probably enough because it runs nightly. For the app ranking, I’d do an A/B test to
    make sure clicks go up. For the streaming pipeline, I’d monitor the data and retrain if it changes.


    For rollout, I’d deploy the model to a small percentage of traffic and then increase it if the results
    look good. If there are problems, I’d roll back. I’d also compare the offline and online numbers to
    make sure they are similar. Overall, offline is for model selection and online is for final validation.'
  expected_concepts:
  - mlops_online_evaluation
  - mlops_serving_modes
  - mlops_model_rollout
  follow_up_seeds:
  - What metrics differ offline vs online?
  - How would you stage the rollout?
  - What rollback signals would you define?
