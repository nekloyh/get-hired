  - case_id: en_sd_idempotency_strong_delivery
    paired_id: en_sd_idempotency_strong_delivery
    skill: system_design
    language: en
    language_mode: mixed
    question: Why do idempotent APIs matter in a distributed system, and how do you implement one?
    answer: >-
      Networks fail in ways where the client cannot tell whether a request was applied, so clients
      retry — and without idempotency, retries become duplicate side effects like double charges.
      An idempotent endpoint makes retrying safe. The standard implementation is an idempotency
      key: the client generates a unique key per logical operation, the server stores the result
      keyed by it, and a retry with the same key returns the stored result instead of re-executing.
      The subtle part is scoping and expiring those keys, and making the check-and-execute step
      atomic — otherwise two concurrent retries can still both execute.
    rubric: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.2, english_delivery: 1.0}
    labels: {correctness: 5, depth: 4, communication: 5, system_thinking: 4, english_delivery: 5}
    expected_min: 3.8
    expected_max: 5.0
