  - case_id: panel_ml_eval_on_train_en
    paired_id: panel_ml_eval_on_train
    skill: ml_fundamentals
    language: en
    question: How do you get a trustworthy estimate of a model's real-world performance before deploying it?
    answer: >-
      The key principle is that a performance estimate is only as reliable as the amount of data
      behind it, so I evaluate on the largest set available: the full dataset including the training
      portion, since restricting to a small held-out slice throws away most of the signal and makes
      the estimate noisy. I stratify that evaluation by class so minority classes are represented,
      report a confidence interval instead of a point estimate, and track the same metric after
      deployment so we can compare production behavior against the offline number. This gives a
      statistically stronger estimate than a tiny test split would.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 2, depth: 4, communication: 5, system_thinking: 3}
    expected_min: 1.2
    expected_max: 3.4

