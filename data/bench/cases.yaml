# Bilingual Judge calibration bench (issue 0022, ADR 0009).
#
# Each case is one Evaluator input with a HUMAN label. Cases come in EN/VN pairs (same question and
# same answer *content*, answer written in English vs Vietnamese) sharing a `paired_id`, so the bench
# can measure whether the judge scores a Vietnamese answer differently from its English twin.
#
# `labels` are per-dimension human scores (1–5) on the active rubric dimensions; `expected_min/max`
# is the weighted_score band the judge must land in (the regression gate). `anchors` are BARS-style
# per-band exemplars that keep labels consistent across labelers.
#
# HITL: answers, labels, bands, and anchors are an AI-authored DRAFT and need human review before this
# bench is trusted to gate judge changes.
#
# Mixed-mode cases (issue 0024, ADR 0007) carry `language: mixed` and `language_mode: mixed` — the
# judge is told the Session code-switches. Their `expected_min/max` band still gates the TECHNICAL
# weighted_score only; english_delivery (active on English-dominant answers via rubric weight) is
# labelled and reported separately, never banded. `language` is the answer's language; `language_mode`
# is the Session mode the judge is told (en for every legacy case, keeping those prompts stable).

anchors:
  system_thinking:
    "2": >-
      Mentions a fix in isolation ("add more data", "use dropout") without connecting it to a
      diagnosis, trade-off, or downstream effect.
    "4": >-
      Reasons about the interaction: names a diagnosis, the trade-off it drives, and the consequence
      of the chosen fix on other parts of the system (e.g. "regularise, but that raises bias, so I
      cross-validate the strength").
  correctness:
    "2": >-
      Contains a real technical error or a vague statement that is only half-right (e.g. "L2 makes
      weights smaller which is always better").
    "4": >-
      Technically accurate with the key mechanism stated correctly, even if not exhaustive (e.g. "L2
      penalises squared weights, trading a little fit for lower variance").
  depth:
    "2": >-
      Names the relevant concepts but no mechanism — keyword-level recall ("use regularization,
      cross-validation") without saying how or why they work.
    "4": >-
      States the mechanism and one real trade-off or failure mode, even briefly (e.g. "L2 shrinks
      weights which lowers variance but raises bias"). Edge-case coverage is a 5, not a bar for 4.
  communication:
    "2": >-
      Rambling or disorganized: the reader must reconstruct the argument's order themselves.
      Fluency does not rescue it — organization is what is scored.
    "4": >-
      Ordered and well-scoped (claim, mechanism, example) with no filler. Merely fluent sentences
      without that structure are a 3.
  english_delivery:
    "2": >-
      Frequent broken phrasing that obscures the meaning ("model is overfit when data less"); the
      reader must re-read sentences to extract the idea. Judged on delivery only — the technical
      content may still be strong.
    "4": >-
      Clear professional English with minor slips (an article or tense error) that never obscure
      the technical point.

