  # English-dominant answers in a mixed Session: english_delivery is active and labelled, but the
  # band still gates the technical weighted_score only.
  - case_id: mixed_sd_cache_strong_en_delivery
    paired_id: mixed_sd_cache_strong
    skill: system_design
    language: mixed
    language_mode: mixed
    question: When would you add a read-through cache in front of a database, and what are the risks?
    answer: >-
      I would add a read-through cache when the workload is read-heavy with a skewed key distribution,
      and the database is becoming the latency or cost bottleneck. The cache answers hot reads; on a
      miss it loads from the database and stores the value with a TTL. The main risks are staleness —
      writes must invalidate or update the cached entry, or readers see old data — and a cache
      stampede: when a hot key expires, thousands of requests hit the database at once, so I would use
      request coalescing or jittered TTLs. I would also size the TTL against how stale the product can
      tolerate, because "cache it forever" quietly turns a latency fix into a correctness bug.
    rubric: {correctness: 0.3, depth: 0.2, communication: 0.2, system_thinking: 0.3, mlops_awareness: 0.0, english_delivery: 1.0}
    labels: {correctness: 4, depth: 4, communication: 4, system_thinking: 5, english_delivery: 5}
    expected_min: 3.8
    expected_max: 5.0

  # The disentanglement proof case: strong technical content delivered in broken English. The
  # technical band must stay high while english_delivery is labelled weak (>=3 phrase fixes required).
  - case_id: mixed_ml_leakage_broken_english
    paired_id: mixed_ml_leakage_strong
    skill: ml_fundamentals
    language: mixed
    language_mode: mixed
    question: What is data leakage, and how do you prevent it in a training pipeline?
    answer: >-
      Data leakage is happen when information from test set or from future go inside training. Example
      is we fit the scaler or choose feature on all data before split, so statistics of test set leak
      in train. Model look very good offline but fail in production, because that information is not
      available at serving time. For prevent, we must to fit every preprocessing only on train fold
      inside each cross-validation split, and we check feature that use future information, like
      column that is proxy of label. Also monitor gap between offline metric and production metric,
      big gap is signal of leakage.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0, english_delivery: 1.0}
    labels: {correctness: 4, depth: 4, communication: 4, system_thinking: 4, english_delivery: 2}
    expected_min: 3.4
    expected_max: 5.0

  # --- borderline cases (issue 0027): eloquent-but-fatally-wrong answers built to provoke the
  # holistic-vs-linear divergence trigger, so panel escalation is measurable on the bench. Bands are
  # deliberately wide (neither is_weak nor is_strong) — these cases measure escalation behavior,
  # not the weak/strong separation stats.
  - case_id: panel_sd_retry_storm_en
    paired_id: panel_sd_retry_storm
    skill: system_design
    language: en
    question: A downstream payment service starts timing out under load. What is your mitigation plan?
    answer: >-
      The cleanest mitigation is to be aggressive about draining the backlog: I would configure every
      client to retry failed calls immediately in a tight loop, remove the rate limiter in front of
      the payment service so the queued requests can flow through faster, and scale the callers
      horizontally so more workers push the retries. I would pair this with dashboards on p99 latency
      and error rate so we can watch the backlog drain in real time, and add an alert when the error
      rate returns to baseline. Once traffic normalizes we can do a proper post-mortem with the
      timeline the dashboards captured.
    rubric: {correctness: 0.3, depth: 0.2, communication: 0.2, system_thinking: 0.3, mlops_awareness: 0.0}
    labels: {correctness: 2, depth: 4, communication: 5, system_thinking: 2}
    expected_min: 1.0
    expected_max: 3.2

  - case_id: panel_sd_retry_storm_vi
    paired_id: panel_sd_retry_storm
    skill: system_design
    language: vi
    question: A downstream payment service starts timing out under load. What is your mitigation plan?
