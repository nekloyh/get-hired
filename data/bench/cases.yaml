  - case_id: vnlp_segmentation_weak_vi
    paired_id: vnlp_segmentation_weak
    skill: vietnamese_nlp
    language: vi
    question: Why is word segmentation important for Vietnamese NLP?
    answer: Vì tiếng Việt khó và cần tách từ ra để mô hình hiểu.
    rubric: {correctness: 0.35, depth: 0.3, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.0}
    labels: {correctness: 2, depth: 1, communication: 3, system_thinking: 1}
    expected_min: 1.0
    expected_max: 2.6

  - case_id: vnlp_segmentation_strong_en
    paired_id: vnlp_segmentation_strong
    skill: vietnamese_nlp
    language: en
    question: Why is word segmentation important for Vietnamese NLP?
    answer: >-
      Vietnamese puts spaces between syllables, not words, so 'học máy' is two syllables but one
      concept (machine learning). Treating each syllable as a token splits entities and concepts apart,
      so I segment into words first with a tool like VnCoreNLP before downstream models, otherwise NER
      and classification degrade.
    rubric: {correctness: 0.35, depth: 0.3, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.0}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 4}
    expected_min: 3.8
    expected_max: 5.0

  - case_id: vnlp_segmentation_strong_vi
    paired_id: vnlp_segmentation_strong
    skill: vietnamese_nlp
    language: vi
    question: Why is word segmentation important for Vietnamese NLP?
    answer: >-
      Tiếng Việt đặt dấu cách giữa các âm tiết chứ không phải giữa các từ, nên 'học máy' là hai âm tiết
      nhưng một khái niệm (machine learning). Coi mỗi âm tiết là một token sẽ tách rời thực thể và khái
      niệm, nên tôi tách từ trước bằng công cụ như VnCoreNLP trước các mô hình downstream, nếu không NER
      và phân loại sẽ kém đi.
    rubric: {correctness: 0.35, depth: 0.3, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.0}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 4}
    expected_min: 3.8
    expected_max: 5.0

  # --- system_design: one strong pair ---
  - case_id: sd_backpressure_strong_en
    paired_id: sd_backpressure_strong
    skill: system_design
    language: en
    question: Your inference API gets more requests than it can serve. How do you degrade gracefully?
    answer: >-
      I put backpressure in front of the model: a bounded queue, admission control, and load shedding
      so excess requests are rejected fast instead of piling up. Past a deadline I return a cheaper
      cached or fallback response, and retry budgets stop clients amplifying the overload — it sheds
      load predictably instead of collapsing.
    rubric: {correctness: 0.3, depth: 0.2, communication: 0.15, system_thinking: 0.25, mlops_awareness: 0.1}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 5, mlops_awareness: 4}
    expected_min: 3.8
    expected_max: 5.0

  - case_id: sd_backpressure_strong_vi
    paired_id: sd_backpressure_strong
    skill: system_design
    language: vi
    question: Your inference API gets more requests than it can serve. How do you degrade gracefully?
    answer: >-
      Tôi đặt backpressure trước mô hình: hàng đợi có giới hạn, admission control và load shedding để
      loại bỏ nhanh các request thừa thay vì dồn ứ. Quá một deadline thì trả về phản hồi rẻ hơn từ cache
      hoặc fallback, và retry budget ngăn client khuếch đại quá tải — hệ thống giảm tải có kiểm soát
      thay vì sụp đổ.
    rubric: {correctness: 0.3, depth: 0.2, communication: 0.15, system_thinking: 0.25, mlops_awareness: 0.1}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 5, mlops_awareness: 4}
    expected_min: 3.8
    expected_max: 5.0

  # --- mlops: one strong pair ---
  - case_id: mlops_monitoring_strong_en
    paired_id: mlops_monitoring_strong
    skill: mlops
    language: en
    question: Once a model is deployed, what would you monitor to know it is still healthy?
    answer: >-
      I watch input drift, the prediction distribution, latency and error rate, and — once true labels
      arrive — live accuracy against the offline baseline. A drift alert is a signal, not an automatic
      retrain: I gate retraining on a measured drop in the delayed ground-truth metric, so covariate
      shift without an accuracy hit does not trigger a needless redeploy.
    rubric: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 4, mlops_awareness: 4}
    expected_min: 3.8
    expected_max: 5.0

  - case_id: mlops_monitoring_strong_vi
    paired_id: mlops_monitoring_strong
    skill: mlops
    language: vi
    question: Once a model is deployed, what would you monitor to know it is still healthy?
    answer: >-
      Tôi theo dõi drift đầu vào, phân phối dự đoán, độ trễ và tỉ lệ lỗi, và — khi có nhãn thật — độ
      chính xác trực tuyến so với baseline offline. Cảnh báo drift là tín hiệu chứ không phải lệnh
      retrain tự động: tôi chỉ retrain khi có sụt giảm đo được ở chỉ số ground-truth trễ, nên covariate
      shift mà không giảm độ chính xác sẽ không kích hoạt tái triển khai vô ích.
    rubric: {correctness: 0.35, depth: 0.25, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.05}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 4, mlops_awareness: 4}
    expected_min: 3.8
    expected_max: 5.0

