# Bilingual Judge calibration bench (issue 0022, ADR 0009).
#
# Each case is one Evaluator input with a HUMAN label. Cases come in EN/VN pairs (same question and
# same answer *content*, answer written in English vs Vietnamese) sharing a `paired_id`, so the bench
# can measure whether the judge scores a Vietnamese answer differently from its English twin.
#
# `labels` are per-dimension human scores (1–5) on the active rubric dimensions; `expected_min/max`
# is the weighted_score band the judge must land in (the regression gate). `anchors` are BARS-style
# per-band exemplars that keep labels consistent across labelers.
#
# HITL: answers, labels, bands, and anchors are an AI-authored DRAFT and need human review before this
# bench is trusted to gate judge changes.

anchors:
  system_thinking:
    "2": >-
      Mentions a fix in isolation ("add more data", "use dropout") without connecting it to a
      diagnosis, trade-off, or downstream effect.
    "4": >-
      Reasons about the interaction: names a diagnosis, the trade-off it drives, and the consequence
      of the chosen fix on other parts of the system (e.g. "regularise, but that raises bias, so I
      cross-validate the strength").
  correctness:
    "2": >-
      Contains a real technical error or a vague statement that is only half-right (e.g. "L2 makes
      weights smaller which is always better").
    "4": >-
      Technically accurate with the key mechanism stated correctly, even if not exhaustive (e.g. "L2
      penalises squared weights, trading a little fit for lower variance").

cases:
  # --- ml_fundamentals: bias/variance, four quality levels ---
  - case_id: ml_bias_variance_weak_en
    paired_id: ml_bias_variance_weak
    skill: ml_fundamentals
    language: en
    question: Explain the bias-variance tradeoff and how it guides regularization.
    answer: >-
      Bias is when the model is wrong and variance is when it changes a lot. You fix it by adding more
      data or using a bigger model.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 2, depth: 1, communication: 3, system_thinking: 2}
    expected_min: 1.0
    expected_max: 2.6

  - case_id: ml_bias_variance_weak_vi
    paired_id: ml_bias_variance_weak
    skill: ml_fundamentals
    language: vi
    question: Explain the bias-variance tradeoff and how it guides regularization.
    answer: >-
      Bias là khi mô hình sai, còn variance là khi nó thay đổi nhiều. Cách sửa là thêm dữ liệu hoặc
      dùng mô hình lớn hơn.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 2, depth: 1, communication: 3, system_thinking: 2}
    expected_min: 1.0
    expected_max: 2.6

  - case_id: ml_bias_variance_strong_en
    paired_id: ml_bias_variance_strong
    skill: ml_fundamentals
    language: en
    question: Explain the bias-variance tradeoff and how it guides regularization.
    answer: >-
      High bias underfits — train and validation error are both high and close; high variance overfits
      — low train error with a wide validation gap. Regularization trades a little fit for lower
      variance: L2 shrinks weights, and I pick its strength by cross-validation where validation error
      bottoms out before the gap widens.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 4}
    expected_min: 3.8
    expected_max: 5.0

  - case_id: ml_bias_variance_strong_vi
    paired_id: ml_bias_variance_strong
    skill: ml_fundamentals
    language: vi
    question: Explain the bias-variance tradeoff and how it guides regularization.
    answer: >-
      Bias cao thì underfit — lỗi train và validation đều cao và gần nhau; variance cao thì overfit —
      lỗi train thấp nhưng khoảng cách tới validation rộng. Regularization đánh đổi một chút độ khớp để
      giảm variance: L2 co nhỏ trọng số, và tôi chọn cường độ bằng cross-validation tại điểm lỗi
      validation thấp nhất trước khi khoảng cách nới rộng.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 4}
    expected_min: 3.8
    expected_max: 5.0

  - case_id: ml_regularization_medium_en
    paired_id: ml_regularization_medium
    skill: ml_fundamentals
    language: en
    question: Why does L2 regularization reduce overfitting and how do you choose its strength?
    answer: >-
      L2 adds a penalty on the squared weights so the model keeps them smaller, which makes it simpler
      and overfit less. I would try a few values and keep the one with the best validation score.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 4, depth: 3, communication: 4, system_thinking: 3}
    expected_min: 2.8
    expected_max: 4.2

  - case_id: ml_regularization_medium_vi
    paired_id: ml_regularization_medium
    skill: ml_fundamentals
    language: vi
    question: Why does L2 regularization reduce overfitting and how do you choose its strength?
    answer: >-
      L2 thêm một khoản phạt trên bình phương trọng số nên mô hình giữ chúng nhỏ hơn, làm mô hình đơn
      giản hơn và ít overfit hơn. Tôi sẽ thử vài giá trị và giữ giá trị có điểm validation tốt nhất.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 4, depth: 3, communication: 4, system_thinking: 3}
    expected_min: 2.8
    expected_max: 4.2

  # --- deep_learning: two quality levels ---
  - case_id: dl_overfitting_weak_en
    paired_id: dl_overfitting_weak
    skill: deep_learning
    language: en
    question: Name two techniques to stop a neural network overfitting and explain one.
    answer: You can use dropout and early stopping. Dropout turns off some neurons so it is better.
    rubric: {correctness: 0.4, depth: 0.25, communication: 0.25, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 3, depth: 2, communication: 3, system_thinking: 2}
    expected_min: 1.6
    expected_max: 3.2

  - case_id: dl_overfitting_weak_vi
    paired_id: dl_overfitting_weak
    skill: deep_learning
    language: vi
    question: Name two techniques to stop a neural network overfitting and explain one.
    answer: >-
      Có thể dùng dropout và early stopping. Dropout tắt bớt một số neuron nên tốt hơn.
    rubric: {correctness: 0.4, depth: 0.25, communication: 0.25, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 3, depth: 2, communication: 3, system_thinking: 2}
    expected_min: 1.6
    expected_max: 3.2

  - case_id: dl_overfitting_strong_en
    paired_id: dl_overfitting_strong
    skill: deep_learning
    language: en
    question: Name two techniques to stop a neural network overfitting and explain one.
    answer: >-
      Dropout and early stopping. Dropout randomly zeroes a fraction of activations each step so the
      network cannot depend on any single unit and learns redundant features; at inference all units
      are on but scaled. Early stopping halts at the validation-loss minimum before overfitting starts.
    rubric: {correctness: 0.4, depth: 0.25, communication: 0.25, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 5, depth: 4, communication: 5, system_thinking: 4}
    expected_min: 3.8
    expected_max: 5.0

  - case_id: dl_overfitting_strong_vi
    paired_id: dl_overfitting_strong
    skill: deep_learning
    language: vi
    question: Name two techniques to stop a neural network overfitting and explain one.
    answer: >-
      Dropout và early stopping. Dropout ngẫu nhiên đưa về 0 một phần activation ở mỗi bước nên mạng
      không thể phụ thuộc vào một neuron duy nhất và học được đặc trưng dư thừa; khi suy luận thì mọi
      neuron đều bật nhưng được co giãn. Early stopping dừng tại điểm lỗi validation thấp nhất trước
      khi bắt đầu overfit.
    rubric: {correctness: 0.4, depth: 0.25, communication: 0.25, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 5, depth: 4, communication: 5, system_thinking: 4}
    expected_min: 3.8
    expected_max: 5.0

  # --- vietnamese_nlp: two quality levels ---
  - case_id: vnlp_segmentation_weak_en
    paired_id: vnlp_segmentation_weak
    skill: vietnamese_nlp
    language: en
    question: Why is word segmentation important for Vietnamese NLP?
    answer: Because Vietnamese is hard and you need to split the words so the model understands.
    rubric: {correctness: 0.35, depth: 0.3, communication: 0.2, system_thinking: 0.15, mlops_awareness: 0.0}
    labels: {correctness: 2, depth: 1, communication: 3, system_thinking: 1}
    expected_min: 1.0
