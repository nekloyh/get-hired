  - case_id: ml_bias_variance_strong_en
    paired_id: ml_bias_variance_strong
    skill: ml_fundamentals
    language: en
    question: Explain the bias-variance tradeoff and how it guides regularization.
    answer: >-
      High bias underfits — train and validation error are both high and close; high variance overfits
      — low train error with a wide validation gap. Regularization trades a little fit for lower
      variance: L2 shrinks weights, and I pick its strength by cross-validation where validation error
      bottoms out before the gap widens.
    rubric: {correctness: 0.4, depth: 0.3, communication: 0.2, system_thinking: 0.1, mlops_awareness: 0.0}
    labels: {correctness: 5, depth: 4, communication: 4, system_thinking: 4}
    expected_min: 3.8
    expected_max: 5.0

  - case_id: ml_bias_variance_strong_vi
    paired_id: ml_bias_variance_strong
    skill: ml_fundamentals
    language: vi
    question: Explain the bias-variance tradeoff and how it guides regularization.
    answer: >-
      Bias cao thì underfit — lỗi train và validation đều cao và gần nhau; variance cao thì overfit —
      lỗi train thấp nhưng khoảng cách tới validation rộng. Regularization đánh đổi một chút độ khớp để
      giảm variance: L2 co nhỏ trọng số, và tôi chọn cường độ bằng cross-validation tại điểm lỗi
      validation thấp nhất trước khi khoảng cách nới rộng.
